<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hintsiders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f7f3ea;
    --ink: #1a1714;
    --ink-soft: #6b6358;
    --ink-faint: #b4ab9c;
    --ink-ghost: #ddd5c4;
    --rule: #d8d0bd;
    --pen-blue: #1a2747;
    --burgundy: #7a2418;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--paper); color: var(--ink); font-family: 'Cormorant Garamond', Georgia, serif; font-size: 17px; line-height: 1.5; -webkit-font-smoothing: antialiased; min-height: 100vh; }

  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--paper); border-left: 1px solid var(--rule); border-right: 1px solid var(--rule); position: relative; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 16px 22px; background: var(--paper); position: sticky; top: 0; z-index: 10; }
  .top-bar .left { display: flex; align-items: center; gap: 10px; }
  .top-bar .mark { width: 24px; height: 24px; cursor: pointer; }
  .group-name { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); cursor: pointer; background: none; border: none; padding: 4px 0; }
  .group-name::after { content: ' ⌄'; color: var(--ink-faint); }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--ink-soft); font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; padding: 4px 0; }
  .icon-btn:hover, .group-name:hover { color: var(--burgundy); }

  /* WORDMARK — JS positions the burgundy i-tittle */
  .wordmark-block { text-align: center; padding: 18px 0 6px; }
  .wordmark-block .home-mark { width: 56px; height: 56px; display: block; margin: 0 auto -2px; }
  .wordmark-block .home-mark.small { width: 44px; height: 44px; }
  /* Simplified home icon block — just the door, larger */
  .home-icon-block { padding: 28px 0 4px; }
  .home-icon-block .home-mark { width: 96px; height: 96px; }
  .wordmark-display {
    font-family: 'Caveat', cursive;
    font-weight: 600;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.005em;
    display: inline-block;
    position: relative;
    font-size: 46px;
  }
  .wordmark-display.large { font-size: 72px; }
  .wordmark-display .ı { display: inline-block; position: relative; }
  .burgundy-dot { position: absolute; background: var(--burgundy); border-radius: 50%; pointer-events: none; }
  .tagline { font-style: italic; color: var(--ink-soft); margin-top: 8px; font-size: 14px; }
  .tagline.large { font-size: 16px; }
  .round-num { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-faint); margin-top: 14px; }

  .round-header { padding: 0 32px 18px; text-align: center; }
  .setter-cat { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 16px; padding-top: 18px; }
  .setter-cat strong { color: var(--ink); font-weight: 500; }
  .framing { font-style: italic; font-size: 16px; line-height: 1.55; color: var(--ink-soft); }
  .framing strong { font-style: normal; font-weight: 500; color: var(--ink); }
  .framing em { color: var(--ink); }

  .meta-row { display: flex; justify-content: space-between; padding: 14px 32px; margin-top: 8px; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-faint); border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
  .meta-row strong { color: var(--ink-soft); font-weight: 500; }
  .nudge-row { text-align: center; padding: 10px 32px 4px; }
  .nudge-btn { background: transparent; border: none; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft); cursor: pointer; padding: 4px 8px; }
  .nudge-btn:hover { color: var(--burgundy); }

  .hints { padding: 16px 36px 20px; }
  .hint-line { display: flex; align-items: baseline; gap: 18px; padding: 16px 0; min-height: 56px; }
  .hint-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-faint); letter-spacing: 0.1em; width: 18px; flex-shrink: 0; padding-top: 14px; }
  .hint-word { flex: 1; font-family: 'Caveat', cursive; font-size: 38px; font-weight: 500; color: var(--pen-blue); line-height: 1.1; }
  .hint-word .letter { display: inline-block; opacity: 0; animation: ink-bleed 0.18s forwards; }
  @keyframes ink-bleed { 0% { opacity: 0; filter: blur(2px); } 100% { opacity: 1; filter: blur(0); } }
  .hint-line.locked .hint-word { color: var(--ink-ghost); font-size: 32px; }
  .hint-day { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--ink-faint); letter-spacing: 0.15em; text-transform: uppercase; padding-top: 20px; white-space: nowrap; }

  .guess-section { padding: 20px 36px 16px; border-top: 1px solid var(--rule); }
  .guess-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px; }
  .guess-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--ink-soft); padding: 4px 0 8px; font-family: 'Caveat', cursive; font-size: 28px; color: var(--pen-blue); outline: none; }
  .guess-input::placeholder { color: var(--ink-ghost); font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; }
  .guess-input:disabled { opacity: 0.5; }
  .guess-help { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--ink-faint); letter-spacing: 0.15em; text-transform: uppercase; }
  .guess-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; gap: 12px; }
  .lock-btn { background: var(--ink); color: var(--paper); border: none; padding: 8px 16px; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; cursor: pointer; border-radius: 2px; }
  .lock-btn:hover:not(:disabled) { background: var(--burgundy); }
  .lock-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Drop-interval toggle on compose screen */
  .interval-toggle { display: flex; gap: 8px; }
  .interval-opt { flex: 1; background: transparent; border: 1px solid var(--rule); padding: 10px 14px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); cursor: pointer; border-radius: 2px; transition: all 0.15s; }
  .interval-opt:hover { border-color: var(--ink-soft); color: var(--ink); }
  .interval-opt.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* Pronoun toggle (similar to interval but for his/her/their) */
  .pronoun-toggle { display: flex; gap: 8px; }
  .pronoun-opt { flex: 1; background: transparent; border: 1px solid var(--rule); padding: 10px 14px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 16px; color: var(--ink-soft); cursor: pointer; border-radius: 2px; transition: all 0.15s; }
  .pronoun-opt:hover { border-color: var(--ink-soft); color: var(--ink); }
  .pronoun-opt.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .input-help { font-size: 13px; font-style: italic; color: var(--ink-soft); margin-top: 8px; line-height: 1.5; }
  .text-input { width: 100%; background: var(--paper); border: 1px solid var(--rule); padding: 10px 12px; font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--ink); outline: none; border-radius: 3px; }
  .text-input:focus { border-color: var(--ink-soft); }

  /* Players' status rows in the feed (replaces the old guess-row layout) */
  .players-status { padding: 4px 0; }
  .player-block { padding: 6px 0 8px; border-bottom: 1px dotted var(--ink-ghost); }
  .player-block:last-child { border-bottom: none; }
  .player-row { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; gap: 12px; }
  .player-row .player-name { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-soft); min-width: 70px; flex-shrink: 0; }
  .player-row .player-state { flex: 1; font-family: 'Caveat', cursive; font-size: 22px; color: var(--pen-blue); }
  .player-row .player-state.pending { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; color: var(--ink-faint); }
  .player-row .player-state.wrong { color: var(--ink-faint); text-decoration: line-through; text-decoration-color: var(--ink-ghost); }
  .player-row .player-state.correct { color: var(--burgundy); font-style: italic; }
  /* History of past wrong guesses across earlier hints */
  .guess-history { display: flex; flex-wrap: wrap; gap: 4px 12px; margin-left: 82px; padding: 0 0 4px; }
  .history-item { display: inline-flex; align-items: baseline; gap: 6px; }
  .history-item .history-hint { font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-faint); }
  .history-item .history-text { font-family: 'Caveat', cursive; font-size: 16px; }
  .history-item .history-text.wrong { color: var(--ink-faint); text-decoration: line-through; text-decoration-color: var(--ink-ghost); }
  .history-item .history-text.correct { color: var(--burgundy); font-style: italic; }

  .feed { padding: 14px 36px 32px; }
  .guess-row { display: flex; justify-content: space-between; align-items: baseline; padding: 8px 0; gap: 12px; }
  .guess-row .who { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-faint); min-width: 56px; flex-shrink: 0; }
  .guess-row .what { flex: 1; font-family: 'Caveat', cursive; font-size: 22px; color: var(--pen-blue); }
  .guess-row .what.wrong { color: var(--ink-faint); text-decoration: line-through; text-decoration-color: var(--ink-ghost); }
  .guess-row .what.correct { color: var(--burgundy); }
  .guess-row .when { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--ink-faint); letter-spacing: 0.1em; flex-shrink: 0; }
  .override-btn { background: none; border: 1px solid var(--ink-ghost); padding: 2px 8px; font-family: 'JetBrains Mono', monospace; font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); cursor: pointer; border-radius: 2px; }
  .override-btn:hover { border-color: var(--burgundy); color: var(--burgundy); }

  .reveal-header { text-align: center; padding: 40px 32px 8px; }
  .reveal-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 16px; }
  .reveal-answer { font-family: 'Caveat', cursive; font-size: 60px; font-weight: 600; line-height: 1; color: var(--pen-blue); margin-bottom: 24px; }
  .reveal-hints { padding: 16px 36px 8px; }
  .reveal-hint { display: flex; align-items: baseline; gap: 18px; padding: 8px 0; }
  .reveal-hint .num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-faint); width: 18px; }
  .reveal-hint .word { font-family: 'Caveat', cursive; font-size: 28px; color: var(--pen-blue); line-height: 1.1; }
  .reveal-hint .word.unlit { color: var(--ink-ghost); opacity: 0.55; font-style: italic; }
  .annotation { margin: 2px 36px 8px 70px; padding: 6px 0; font-style: italic; font-size: 14px; color: var(--ink-soft); line-height: 1.4; cursor: pointer; }
  .annotation:hover { color: var(--ink); }
  .annotation::before { content: '— '; color: var(--ink-faint); }
  .annotation.empty { color: var(--ink-faint); font-size: 13px; }
  .winner-line { text-align: center; padding: 28px 32px 36px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-faint); }
  .winner-line .name { font-family: 'Caveat', cursive; font-size: 28px; color: var(--pen-blue); display: block; margin: 6px 0 4px; text-transform: none; letter-spacing: 0; font-weight: 500; }

  .archive-list { padding: 8px 32px 40px; }
  .archive-entry { display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: baseline; padding: 14px 0; border-bottom: 1px solid var(--rule); cursor: pointer; }
  .archive-entry:hover .entry-answer { color: var(--burgundy); }
  .entry-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-faint); letter-spacing: 0.1em; }
  .entry-mid { display: flex; flex-direction: column; gap: 2px; }
  .entry-answer { font-family: 'Caveat', cursive; font-size: 22px; color: var(--ink); transition: color 0.2s; line-height: 1.1; }
  .entry-meta { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); }
  .entry-stat { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-soft); text-align: right; }
  .entry-stat .small { font-size: 9px; color: var(--ink-faint); letter-spacing: 0.15em; display: block; }

  .auth-screen { padding: 60px 32px; text-align: center; }
  .auth-screen .auth-mark { margin: 0 auto 14px; }
  .auth-screen p { font-style: italic; color: var(--ink-soft); margin: 22px 0 32px; line-height: 1.6; }
  .input-block { margin-bottom: 16px; text-align: left; }
  .input-block label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-soft); display: block; margin-bottom: 6px; }
  .input-block input, .input-block select, .input-block textarea { width: 100%; background: var(--paper); border: 1px solid var(--rule); padding: 10px 12px; font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--ink); outline: none; border-radius: 3px; }
  .input-block input:focus, .input-block select:focus, .input-block textarea:focus { border-color: var(--ink-soft); }
  .btn { display: inline-block; background: var(--ink); color: var(--paper); border: none; padding: 12px 28px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; border-radius: 2px; margin-top: 8px; }
  .btn:hover { background: var(--burgundy); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost { background: none; color: var(--ink-soft); border: 1px solid var(--rule); }
  .btn-ghost:hover { background: var(--paper); color: var(--ink); }

  .empty-state { padding: 60px 32px; text-align: center; }
  .empty-state h2 { font-style: italic; font-size: 22px; color: var(--ink); margin-bottom: 8px; }
  .empty-state p { color: var(--ink-soft); font-style: italic; line-height: 1.6; margin-bottom: 24px; }

  .compose-screen { padding: 8px 0 40px; }
  .compose-block { padding: 18px 32px 6px; }
  .compose-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px; }
  .compose-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--ink-ghost); padding: 4px 0 8px; font-family: 'Caveat', cursive; font-size: 30px; color: var(--pen-blue); outline: none; }
  .compose-input.with-text { border-bottom-color: var(--ink-soft); }
  .compose-input::placeholder { color: var(--ink-ghost); font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; }
  .compose-input.compose-answer-input { font-size: 26px; }
  .compose-actions { padding: 28px 32px 0; display: flex; gap: 12px; justify-content: center; }
  .compose-actions .btn { margin-top: 0; }

  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--paper); padding: 12px 20px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; border-radius: 3px; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 100; }
  .toast.show { opacity: 1; }
  .group-switcher { position: absolute; top: 56px; left: 22px; right: 22px; background: var(--paper); border: 1px solid var(--rule); border-radius: 6px; box-shadow: 0 12px 30px rgba(0,0,0,0.1); z-index: 20; padding: 8px 0; display: none; }
  .group-switcher.open { display: block; }
  .switcher-row { display: flex; align-items: center; }
  .switcher-row .switcher-item { flex: 1; }
  .switcher-manage { background: none; border: none; color: var(--ink-faint); font-size: 16px; padding: 8px 14px; cursor: pointer; border-radius: 4px; }
  .switcher-manage:hover { color: var(--burgundy); background: rgba(122, 36, 24, 0.05); }
  .switcher-item { display: block; width: 100%; text-align: left; background: none; border: none; padding: 10px 18px; font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--ink); cursor: pointer; font-style: italic; }
  .switcher-item:hover { background: var(--paper); color: var(--burgundy); }
  .switcher-item.active { color: var(--burgundy); }
  .switcher-divider { height: 1px; background: var(--rule); margin: 6px 0; }

  /* Group detail / manage screen */
  .detail-screen { padding: 32px 32px 60px; }
  .detail-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-faint); text-align: center; margin-bottom: 8px; }
  .detail-title { font-family: 'Caveat', cursive; font-size: 44px; font-weight: 600; color: var(--ink); text-align: center; margin-bottom: 36px; }
  .detail-block { margin-bottom: 28px; }
  .detail-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 10px; }
  .detail-row { display: flex; align-items: center; gap: 10px; }
  .invite-code { flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 16px; color: var(--ink); background: var(--paper); border: 1px solid var(--rule); padding: 10px 14px; border-radius: 3px; letter-spacing: 0.05em; }
  .detail-btn { margin-top: 8px; }
  .detail-btn.full { display: block; width: 100%; text-align: center; }
  .detail-btn.danger { color: var(--burgundy); border-color: rgba(122, 36, 24, 0.3); }
  .detail-btn.danger:hover { background: var(--burgundy); color: var(--paper); border-color: var(--burgundy); }

  .ink-stroke { stroke: var(--pen-blue); fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .knob { fill: var(--burgundy); stroke: var(--burgundy); }

  .loading { padding: 80px 32px; text-align: center; color: var(--ink-faint); font-style: italic; }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading">opening…</div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = window.SUPABASE_URL || 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || 'YOUR_SUPABASE_ANON_KEY';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true,
  },
});

// ============================================================
// STATE
// ============================================================
const state = {
  user: null,
  profile: null,
  groups: [],
  currentGroupId: null,
  view: 'loading',
  activeRound: null,
  hints: [],
  guesses: [],
  archive: [],
  members: [],
  compose: { answer: '', category: 'person', drafts: ['','','','',''], dropInterval: 24 },
  switcherOpen: false,
  manageGroupId: null,
};

// ============================================================
// CONSTANTS
// ============================================================
const FRAMINGS = {
  person: 'someone you all know',
  place: "somewhere you've all been",
  song: "something you've all heard",
  movie: "something you've all seen",
  moment: 'something that happened',
};
const SLOT_GUIDANCE = ['vague', 'place or era', 'a connection', 'narrowing', 'giveaway'];
const DAYS = ['sun','mon','tue','wed','thu','fri','sat'];

const $app = document.getElementById('app');
const $toast = document.getElementById('toast');
function toast(msg) { $toast.textContent = msg; $toast.classList.add('show'); setTimeout(() => $toast.classList.remove('show'), 2200); }
function escape(s) { const div = document.createElement('div'); div.textContent = s ?? ''; return div.innerHTML; }
function relTime(iso) { const t = new Date(iso); const h = t.getHours(); const m = String(t.getMinutes()).padStart(2,'0'); const ampm = h>=12?'p':'a'; const hh = ((h+11)%12)+1; return `${hh}:${m}${ampm}`; }
function dayShort(iso) { return DAYS[new Date(iso).getDay()]; }

// ============================================================
// MARK SVG
// ============================================================
const MARK_SVG = (size = 24, strokeBase = 3.4) => `
<svg class="mark" width="${size}" height="${size}" viewBox="0 0 120 120">
  <path class="ink-stroke" stroke-width="${strokeBase}" d="M 41 32 Q 26 39 28 58 Q 27 74 39 83 L 35 98 L 89 96 L 84 78 Q 98 71 94 51 Q 97 30 73 25 Q 51 22 41 32 Q 43 31 42 33"/>
  <path class="ink-stroke" stroke-width="${(strokeBase * 0.76).toFixed(2)}" d="M 30 48 L 31 72 L 47 70 L 45 47 L 30 49"/>
  ${size >= 60 ? `<path class="ink-stroke" stroke-width="${(strokeBase * 0.5).toFixed(2)}" opacity="0.5" d="M 31 49 L 32 71 L 46 70"/>` : ''}
  <ellipse class="knob" stroke-width="${(strokeBase * 0.6).toFixed(2)}" cx="42" cy="61" rx="${size >= 60 ? 2 : 2.6}" ry="${size >= 60 ? 1.7 : 2.2}"/>
  ${size >= 60 ? `<circle fill="var(--pen-blue)" cx="76" cy="35" r="0.6" opacity="0.5"/>` : ''}
</svg>`;

// Larger mark for use above the wordmark on home screens — uses class home-mark
const MARK_SVG_HOME = (size = 56) => `

// "Mike" -> "Mike's", "Chris" -> "Chris's" (simple — names ending in s also get 's; that's fine for first names)
function possessive(name) {
  if (!name) return 'their';
  return `${name}'s`;
}

// Native share (or clipboard fallback) — opens the OS share sheet so the user
// can drop a quick message into their group chat.
async function nudgeFriends(message) {
  const url = 'https://hintsiders.com';
  const shareData = { title: 'hintsiders', text: message, url };
  // Web Share API works on iOS Safari, Android Chrome, and modern desktop
  if (navigator.share) {
    try {
      await navigator.share(shareData);
      return;
    } catch (e) {
      // User cancelled the share sheet — that's fine, do nothing
      if (e.name === 'AbortError') return;
      // Other errors fall through to clipboard
    }
  }
  // Fallback: copy to clipboard
  try {
    await navigator.clipboard.writeText(`${message} ${url}`);
    toast('copied — paste it in your group chat');
  } catch (e) {
    toast('share not supported on this device');
    console.error('share failed:', e);
  }
}

function wordmarkHtml(large = false) {
  return `<span class="wordmark-display ${large?'large':''}">h<span class="ı">ı</span>ntsiders<span class="burgundy-dot"></span></span>`;
}

function placeBurgundyDot(wordmarkEl) {
  const fontSize = parseFloat(getComputedStyle(wordmarkEl).fontSize);
  const dot = wordmarkEl.querySelector('.burgundy-dot');
  const dotlessI = wordmarkEl.querySelector('.ı');
  if (!dot || !dotlessI) return;
  const dotW = fontSize * 0.10;
  const dotH = fontSize * 0.085;
  const stemRect = dotlessI.getBoundingClientRect();
  const wordRect = wordmarkEl.getBoundingClientRect();
  const left = (stemRect.left - wordRect.left) + (stemRect.width / 2) - (dotW / 2) + (fontSize * 0.12);
  const top = (stemRect.top - wordRect.top) + (fontSize * 0.30);
  dot.style.width = dotW + 'px';
  dot.style.height = dotH + 'px';
  dot.style.left = left + 'px';
  dot.style.top = top + 'px';
  dot.style.transform = 'rotate(-8deg)';
}
function placeAllDots() {
  document.querySelectorAll('.wordmark-display').forEach(placeBurgundyDot);
}

// ============================================================
// AUTH
// ============================================================
async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session?.user) { state.user = session.user; await loadProfile(); }
  else { state.view = 'auth'; render(); }
  supabase.auth.onAuthStateChange(async (_e, sess) => {
    if (sess?.user) { state.user = sess.user; await loadProfile(); }
    else { state.user = null; state.profile = null; state.view = 'auth'; render(); }
  });
}

async function loadProfile() {
  const { data } = await supabase.from('profiles').select('*').eq('id', state.user.id).maybeSingle();
  if (!data) { state.view = 'set-name'; render(); return; }
  state.profile = data;
  await loadGroups();
}
async function saveName(name, pronoun) {
  await supabase.from('profiles').upsert({ id: state.user.id, display_name: name, pronoun: pronoun || 'their' });
  await loadProfile();
}
async function sendMagicLink(email) {
  const { error } = await supabase.auth.signInWithOtp({ email, options: { emailRedirectTo: window.location.origin } });
  if (error) { toast(error.message); return false; }
  return true;
}
async function signOut() { await supabase.auth.signOut(); }

// ============================================================
// GROUPS
// ============================================================
async function loadGroups() {
  const { data: memberships } = await supabase.from('group_members').select('group_id, groups(*)').eq('profile_id', state.user.id);
  // Filter out archived groups so they no longer appear in the switcher
  state.groups = (memberships || []).map(m => m.groups).filter(g => g && !g.archived);
  if (state.groups.length === 0) { state.view = 'no-groups'; render(); return; }
  // Default to last-viewed group from localStorage if present and valid; otherwise first group
  const lastSeen = localStorage.getItem('hintsiders.lastGroup');
  if (!state.currentGroupId || !state.groups.find(g => g.id === state.currentGroupId)) {
    if (lastSeen && state.groups.find(g => g.id === lastSeen)) {
      state.currentGroupId = lastSeen;
    } else {
      state.currentGroupId = state.groups[0].id;
    }
  }
  localStorage.setItem('hintsiders.lastGroup', state.currentGroupId);
  await loadGroupContext();
}
async function createGroup(name, hour, tz) {
  const { data: g, error } = await supabase.from('groups').insert({ name, created_by: state.user.id, hint_drop_hour: hour, timezone: tz }).select().single();
  if (error) { toast(error.message); return; }
  await supabase.from('group_members').insert({ group_id: g.id, profile_id: state.user.id });
  state.currentGroupId = g.id;
  localStorage.setItem('hintsiders.lastGroup', g.id);
  await loadGroups();
}
async function joinGroup(code) {
  const { data: g, error } = await supabase.from('groups').select('*').eq('invite_code', code.trim()).maybeSingle();
  if (error || !g) { toast('group not found'); return; }
  await supabase.from('group_members').insert({ group_id: g.id, profile_id: state.user.id });
  state.currentGroupId = g.id;
  localStorage.setItem('hintsiders.lastGroup', g.id);
  await loadGroups();
}
async function archiveGroup(groupId) {
  if (!confirm('Archive this group? It will be hidden from your group list. You can unarchive from any future "view archived" option.')) return;
  await supabase.from('groups').update({ archived: true }).eq('id', groupId);
  if (state.currentGroupId === groupId) state.currentGroupId = null;
  await loadGroups();
}

async function leaveGroup(groupId) {
  if (!confirm('Leave this group? You will stop seeing it. Other members can keep playing.')) return;
  await supabase.from('group_members').delete().eq('group_id', groupId).eq('profile_id', state.user.id);
  if (state.currentGroupId === groupId) state.currentGroupId = null;
  state.manageGroupId = null;
  state.view = 'home';
  await loadGroups();
  toast('left group');
}

async function deleteGroup(groupId) {
  const g = state.groups.find(x => x.id === groupId);
  const name = g?.name || 'this group';
  if (!confirm(`Permanently delete "${name}" for everyone? All rounds, hints, and guesses will be lost. This cannot be undone.`)) return;
  if (!confirm(`Final confirm — delete "${name}" forever?`)) return;
  // Delete in order: guesses → hints → rounds → group_members → groups
  // (foreign keys cascade in our schema, but doing it explicitly is safer)
  await supabase.from('groups').delete().eq('id', groupId);
  if (state.currentGroupId === groupId) state.currentGroupId = null;
  state.manageGroupId = null;
  state.view = 'home';
  await loadGroups();
  toast('group deleted');
}
async function loadGroupContext() {
  const gid = state.currentGroupId;
  // Reset state from the previous group so we don't render stale data
  state.activeRound = null;
  state.hints = [];
  state.guesses = [];
  state.members = [];
  state.archive = [];
  state.compose = { answer: '', category: 'person', drafts: ['','','','',''], dropInterval: 24 };
  // Tear down any realtime subscription from a previous group
  if (channel) { try { supabase.removeChannel(channel); } catch (e) {} channel = null; }

  const { data: mems } = await supabase.from('group_members').select('profile_id, profiles(*)').eq('group_id', gid);
  state.members = (mems || []).map(m => m.profiles).filter(Boolean);
  const { data: draft } = await supabase.from('rounds').select('*').eq('group_id', gid).eq('setter_id', state.user.id).eq('status', 'drafting').maybeSingle();
  const { data: active } = await supabase.from('rounds').select('*').eq('group_id', gid).eq('status', 'active').maybeSingle();
  const { data: lastDone } = await supabase.from('rounds').select('*').eq('group_id', gid).in('status', ['solved','unsolved']).order('solved_at', { ascending: false, nullsFirst: false }).limit(1).maybeSingle();
  if (draft) {
    state.activeRound = draft;
    await loadHints(draft.id);
    state.compose.answer = draft.answer === 'PENDING' ? '' : draft.answer;
    state.compose.category = draft.category;
    state.compose.drafts = [0,1,2,3,4].map(i => state.hints.find(h => h.position === i+1)?.text ?? '');
    state.compose.dropInterval = draft.drop_interval_hours || 24;
    state.view = 'compose';
  } else if (active) {
    state.activeRound = active;
    await loadHints(active.id);
    await loadGuesses(active.id);
    state.view = 'home';
    subscribeToRound(active.id);
  } else if (lastDone) {
    state.activeRound = lastDone;
    await loadHints(lastDone.id);
    state.view = 'reveal';
  } else {
    state.activeRound = null;
    state.view = 'home';
  }
  render();
}
async function loadHints(roundId) {
  const { data } = await supabase.from('hints').select('*').eq('round_id', roundId).order('position');
  state.hints = data || [];
}
async function loadGuesses(roundId) {
  const { data } = await supabase.from('guesses').select('*, profiles(display_name)').eq('round_id', roundId).order('created_at');
  state.guesses = data || [];
}
async function loadArchive() {
  const { data } = await supabase.from('rounds').select('*, profiles!rounds_setter_id_fkey(display_name)').eq('group_id', state.currentGroupId).in('status', ['solved','unsolved']).order('round_number', { ascending: false });
  state.archive = data || [];
}

// ============================================================
// REALTIME
// ============================================================
let channel = null;
function subscribeToRound(roundId) {
  if (channel) { try { supabase.removeChannel(channel); } catch (e) {} channel = null; }
  channel = supabase.channel(`round:${roundId}`)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'guesses', filter: `round_id=eq.${roundId}` }, async () => {
      // Someone (us or another player) submitted a guess — refresh quietly
      await loadGuesses(roundId);
      const r = await supabase.from('rounds').select('*').eq('id', roundId).single();
      state.activeRound = r.data;
      if (r.data.status !== 'active') { await loadGroupContext(); return; }
      render();
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'guesses', filter: `round_id=eq.${roundId}` }, async () => {
      // setter override etc — refresh quietly
      await loadGuesses(roundId);
      const r = await supabase.from('rounds').select('*').eq('id', roundId).single();
      state.activeRound = r.data;
      if (r.data.status !== 'active') { await loadGroupContext(); return; }
      render();
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rounds', filter: `id=eq.${roundId}` }, async (p) => {
      state.activeRound = p.new;
      await loadHints(roundId);
      if (p.new.status !== 'active') { await loadGroupContext(); return; }
      render();
    })
    .subscribe();
}

// ============================================================
// ROUND ACTIONS
// ============================================================
async function startNewRound(category) {
  const { data: lastRound } = await supabase.from('rounds').select('round_number').eq('group_id', state.currentGroupId).order('round_number', { ascending: false }).limit(1).maybeSingle();
  const nextNum = (lastRound?.round_number || 0) + 1;
  const { data: r, error } = await supabase.from('rounds').insert({
    group_id: state.currentGroupId, setter_id: state.user.id, round_number: nextNum,
    category, answer: 'PENDING', status: 'drafting',
    drop_interval_hours: 24,
  }).select().single();
  if (error) { toast(error.message); return; }
  state.activeRound = r;
  state.compose = { answer: '', category, drafts: ['','','','',''], dropInterval: 24 };
  state.hints = [];
  state.view = 'compose';
  render();
}
async function saveComposeDraft() {
  // Save answer + drop interval if changed
  const updates = {};
  if (state.compose.answer.trim()) updates.answer = state.compose.answer.trim();
  let intervalChanged = false;
  let prevInterval = state.activeRound.drop_interval_hours;
  if (state.compose.dropInterval && state.compose.dropInterval !== state.activeRound.drop_interval_hours) {
    updates.drop_interval_hours = state.compose.dropInterval;
    state.activeRound.drop_interval_hours = state.compose.dropInterval;
    intervalChanged = true;
  }
  if (Object.keys(updates).length) {
    const { error } = await supabase.from('rounds').update(updates).eq('id', state.activeRound.id);
    if (error) {
      // Roll back the optimistic local change so UI stays honest
      if (intervalChanged) state.activeRound.drop_interval_hours = prevInterval;
      toast('save failed — try again');
      console.error('saveComposeDraft round update failed:', error);
      return false;
    }
  }
  for (let i = 0; i < 5; i++) {
    const text = state.compose.drafts[i].trim();
    if (!text) continue;
    const existing = state.hints.find(h => h.position === i+1);
    if (existing) {
      if (existing.text !== text) {
        const { error } = await supabase.from('hints').update({ text }).eq('id', existing.id);
        if (error) { toast('hint save failed'); console.error('hint update failed:', error); return false; }
        existing.text = text;
      }
    } else {
      const { data, error } = await supabase.from('hints').insert({ round_id: state.activeRound.id, position: i+1, text }).select().single();
      if (error) { toast('hint save failed'); console.error('hint insert failed:', error); return false; }
      if (data) state.hints.push(data);
    }
  }
  return true;
}
async function submitRound() {
  if (!state.compose.answer.trim()) { toast('set the answer first'); return; }
  if (state.compose.drafts.some(d => !d.trim())) { toast('write all 5 hints first'); return; }
  const ok = await saveComposeDraft();
  if (!ok) { toast('could not save — please try again'); return; }
  const { error } = await supabase.rpc('submit_round', { p_round_id: state.activeRound.id });
  if (error) { toast(error.message); return; }
  toast('round live · hint 1 dropped');
  await loadGroupContext();
}
async function abandonDraft() {
  if (!confirm('Throw out this draft?')) return;
  await supabase.from('rounds').delete().eq('id', state.activeRound.id);
  state.activeRound = null;
  state.compose = { answer: '', category: 'person', drafts: ['','','','',''], dropInterval: 24 };
  state.hints = [];
  state.view = 'home';
  render();
}
async function submitGuess(text) {
  // Wait for server confirmation before updating UI. Less snappy by ~300ms,
  // but eliminates the race where navigation/reload between optimistic update
  // and confirmation drops the guess from local state.
  const { data, error } = await supabase.rpc('submit_guess', { p_round_id: state.activeRound.id, p_text: text });
  if (error) {
    toast('guess failed — please try again');
    console.error('submitGuess failed:', error);
    return;
  }
  // Server saved it — now refresh state from the server (single source of truth)
  await loadGuesses(state.activeRound.id);
  const { data: r } = await supabase.from('rounds').select('*').eq('id', state.activeRound.id).single();
  state.activeRound = r;
  if (data?.correct) toast('you got it');
  if (r.status !== 'active') { await loadGroupContext(); return; }
  render();
}
async function overrideGuess(guessId) {
  if (!confirm('Mark this as correct? Round will end.')) return;
  const { error } = await supabase.rpc('override_guess', { p_guess_id: guessId });
  if (error) { toast(error.message); return; }
  await loadGroupContext();
}
async function saveAnnotation(hintId, text) {
  await supabase.from('hints').update({ annotation: text }).eq('id', hintId);
  await loadHints(state.activeRound.id);
  render();
}

// ============================================================
// RENDER
// ============================================================
function render() {
  if (state.view === 'auth') return renderAuth();
  if (state.view === 'set-name') return renderSetName();
  if (state.view === 'no-groups') return renderNoGroups();
  if (state.view === 'create-group') return renderCreateGroup();
  if (state.view === 'join-group') return renderJoinGroup();
  if (state.view === 'home') return renderHome();
  if (state.view === 'compose') return renderCompose();
  if (state.view === 'reveal') return renderReveal();
  if (state.view === 'archive') return renderArchive();
  if (state.view === 'group-detail') return renderGroupDetail();
  if (state.view === 'edit-profile') return renderEditProfile();
  $app.innerHTML = '<div class="loading">…</div>';
}

function afterRender() {
  // Place dots after fonts settle
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => placeAllDots());
  } else {
    placeAllDots();
  }
}

function wireTopBar() {
  document.getElementById('grp-btn').onclick = () => { state.switcherOpen = !state.switcherOpen; render(); };
  document.getElementById('archive-btn').onclick = async () => { await loadArchive(); state.view = 'archive'; render(); };
  document.getElementById('menu-btn').onclick = () => { state.switcherOpen = !state.switcherOpen; render(); };
  state.groups.forEach(g => {
    const el = document.querySelector(`[data-gid="${g.id}"]`);
    if (el) el.onclick = async () => {
      state.currentGroupId = g.id;
      localStorage.setItem('hintsiders.lastGroup', g.id);
      state.switcherOpen = false;
      await loadGroupContext();
    };
    const m = document.querySelector(`[data-manage-gid="${g.id}"]`);
    if (m) m.onclick = (e) => {
      e.stopPropagation();
      state.manageGroupId = g.id;
      state.switcherOpen = false;
      state.view = 'group-detail';
      render();
    };
  });
  const swc = document.getElementById('sw-create'); if (swc) swc.onclick = () => { state.view = 'create-group'; state.switcherOpen = false; render(); };
  const swj = document.getElementById('sw-join'); if (swj) swj.onclick = () => { state.view = 'join-group'; state.switcherOpen = false; render(); };
  const swn = document.getElementById('sw-name'); if (swn) swn.onclick = () => {
    state.switcherOpen = false;
    state.view = 'edit-profile';
    render();
  };
  const sso = document.getElementById('sw-signout'); if (sso) sso.onclick = signOut;
}

function categoryLabel(cat) {
  if (cat === 'moment') return 'a moment';
  const vowels = 'aeiou';
  return `${vowels.includes(cat[0]) ? 'an' : 'a'} ${cat}`;
}
function animateWord(text, animate) {
  if (!animate) return escape(text);
  return text.split('').map((c, i) => {
    const ch = c === ' ' ? '&nbsp;' : escape(c);
    return `<span class="letter" style="animation-delay:${(i*0.09 + Math.random()*0.06).toFixed(2)}s">${ch}</span>`;
  }).join('');
}

function renderHome() {
  if (!state.activeRound) return renderHomeEmpty();
  const r = state.activeRound;
  const isSetter = r.setter_id === state.user.id;
  const setter = state.members.find(m => m.id === r.setter_id);
  const myGuessThisHint = state.guesses.find(g => g.guesser_id === state.user.id && g.hint_index_at_guess === r.current_hint_index);

  // Players' full guess history across all hints (everyone except setter)
  const otherMembers = state.members.filter(m => m.id !== r.setter_id);
  const playerStatus = otherMembers.map(m => {
    const allGuesses = state.guesses
      .filter(x => x.guesser_id === m.id)
      .sort((a, b) => a.hint_index_at_guess - b.hint_index_at_guess);
    const currentGuess = allGuesses.find(x => x.hint_index_at_guess === r.current_hint_index);
    return { profile: m, allGuesses, currentGuess };
  });

  $app.innerHTML = `
    ${topBar()}
    <div class="wordmark-block home-icon-block">
      ${MARK_SVG_HOME(96)}
      ${wordmarkHtml()}
    </div>
    <div class="round-header">
      <div class="framing">
        ${escape(setter?.display_name || 'someone')} has ${categoryLabel(r.category)} in mind.<br>
        See if you can figure out what's in ${setter?.pronoun || 'their'} head.
      </div>
    </div>
    <div class="meta-row">
      <span><strong>hint</strong> ${r.current_hint_index} of 5</span>
      <span><strong>next hint</strong> ${r.next_unlock_at ? new Date(r.next_unlock_at).toLocaleString([], {weekday:'short', hour:'2-digit', minute:'2-digit'}) : '—'}</span>
    </div>
    <div class="nudge-row">
      <button class="nudge-btn" id="nudge-btn">↗ nudge friends</button>
    </div>
    <div class="hints" id="hint-list">
      ${[1,2,3,4,5].map(pos => {
        const h = state.hints.find(x => x.position === pos);
        const unlocked = pos <= r.current_hint_index;
        const showText = unlocked || isSetter;
        const wordHtml = showText && h ? animateWord(h.text, pos === r.current_hint_index && unlocked) : '— — —';
        return `<div class="hint-line ${unlocked?'':'locked'}">
          <span class="hint-num">0${pos}</span>
          <span class="hint-word">${wordHtml}</span>
          <span class="hint-day">${h?.unlocked_at ? dayShort(h.unlocked_at) : ''}</span>
        </div>`;
      }).join('')}
    </div>
    ${isSetter ? '' : `
    <div class="guess-section">
      <div class="guess-label">your guess · ${myGuessThisHint ? 'locked in' : '1 of 1 today'}</div>
      <input class="guess-input" id="guess-input" placeholder="${myGuessThisHint ? '— wait for the next hint —' : 'who is it…'}" ${myGuessThisHint?'disabled':''} />
      <div class="guess-actions">
        <span class="guess-help">enter to submit</span>
        <button class="lock-btn" id="lock-btn" ${myGuessThisHint?'disabled':''}>lock it in →</button>
      </div>
    </div>`}
    <div class="feed">
      <div class="players-status">
        ${playerStatus.map(({profile, allGuesses, currentGuess}) => `
          <div class="player-block">
            <div class="player-row">
              <span class="player-name">${escape(profile.display_name || '?')}</span>
              <span class="player-state ${currentGuess ? (currentGuess.is_correct?'correct':'wrong') : 'pending'}">
                ${currentGuess ? (currentGuess.is_correct ? '✓ got it' : escape(currentGuess.text)) : '— thinking… —'}
              </span>
              ${isSetter && currentGuess && !currentGuess.is_correct ? `<button class="override-btn" data-gid="${currentGuess.id}">count it</button>` : ''}
            </div>
            ${allGuesses.length > (currentGuess ? 1 : 0) ? `
              <div class="guess-history">
                ${allGuesses.filter(g => g.hint_index_at_guess !== r.current_hint_index).map(g => `
                  <span class="history-item">
                    <span class="history-hint">h${g.hint_index_at_guess}</span>
                    <span class="history-text ${g.is_correct?'correct':'wrong'}">${escape(g.text)}</span>
                  </span>
                `).join('')}
              </div>
            ` : ''}
          </div>
        `).join('')}
      </div>
    </div>`;
  wireTopBar();
  // Wire up the nudge button — different message for setter vs guesser
  const nudge = document.getElementById('nudge-btn');
  if (nudge) {
    nudge.onclick = () => {
      const setterName = state.members.find(m => m.id === r.setter_id)?.display_name || 'someone';
      let msg;
      if (isSetter) {
        msg = `Hint ${r.current_hint_index} just dropped on hintsiders 👀`;
      } else {
        msg = `${setterName} dropped hint ${r.current_hint_index} on hintsiders. Lock in your guess.`;
      }
      nudgeFriends(msg);
    };
  }
  if (!isSetter) {
    const inp = document.getElementById('guess-input');
    const lockBtn = document.getElementById('lock-btn');
    const submit = async () => {
      const v = inp.value.trim();
      if (!v) return;
      // Lock the input immediately so the user can't double-submit during the wait
      inp.disabled = true;
      if (lockBtn) {
        lockBtn.disabled = true;
        lockBtn.textContent = 'sending…';
      }
      await submitGuess(v);
      // After submitGuess returns, render() will already have rebuilt the screen
      // with the correct locked/unlocked state based on server truth.
    };
    if (inp && !myGuessThisHint) {
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    }
    if (lockBtn && !myGuessThisHint) {
      lockBtn.addEventListener('click', submit);
    }
  }
  if (isSetter) {
    document.querySelectorAll('.override-btn').forEach(b => b.onclick = () => overrideGuess(b.dataset.gid));
  }
  afterRender();
}

    ${topBar()}
    <div class="wordmark-block" style="padding-top:32px">
      ${MARK_SVG_HOME(56)}
      ${wordmarkHtml()}
      <div class="tagline">you know you know</div>

function renderCompose() {
  const c = state.compose;
  $app.innerHTML = `
    ${topBar()}
    <div class="wordmark-block">
      ${MARK_SVG_HOME(48)}
      ${wordmarkHtml()}
      <div class="tagline">you know you know</div>
    </div>
    <div class="round-header">
      <div class="setter-cat">your turn · ${categoryLabel(c.category)}</div>
    </div>
    <div class="compose-screen">
      <div class="compose-block">
        <div class="compose-label">the answer · only you see this</div>
        <input class="compose-input compose-answer-input ${c.answer?'with-text':''}" id="c-answer" type="text" value="${escape(c.answer)}" placeholder="who or what is it?" />
      </div>
      ${[0,1,2,3,4].map(i => `
        <div class="compose-block">
          <div class="compose-label">hint 0${i+1} · ${SLOT_GUIDANCE[i]}</div>
          <input class="compose-input ${c.drafts[i]?'with-text':''}" data-pos="${i+1}" type="text" value="${escape(c.drafts[i])}" placeholder="one word…" />
        </div>
      `).join('')}
      <div class="compose-block">
        <div class="compose-label">drop a new hint every</div>
        <div class="interval-toggle">
          <button class="interval-opt ${c.dropInterval===12?'active':''}" data-interval="12">12 hours</button>
          <button class="interval-opt ${c.dropInterval===24?'active':''}" data-interval="24">24 hours</button>
        </div>
      </div>
      <div class="compose-actions">
        <button class="btn btn-ghost" id="c-abandon">throw out</button>
        <button class="btn" id="c-submit">submit</button>
      </div>
    </div>`;
  wireTopBar();
  const ans = document.getElementById('c-answer');
  ans.addEventListener('input', () => { c.answer = ans.value; });
  ans.addEventListener('blur', saveComposeDraft);
  document.querySelectorAll('.compose-input[data-pos]').forEach(el => {
    el.addEventListener('input', () => { c.drafts[parseInt(el.dataset.pos) - 1] = el.value; });
    el.addEventListener('blur', saveComposeDraft);
  });
  document.querySelectorAll('.interval-opt').forEach(b => {
    b.onclick = async () => {
      const newInterval = parseInt(b.dataset.interval);
      if (c.dropInterval === newInterval) return;
      c.dropInterval = newInterval;
      // Update the visual state immediately so user sees the toggle change
      document.querySelectorAll('.interval-opt').forEach(el => el.classList.remove('active'));
      b.classList.add('active');
      const ok = await saveComposeDraft();
      if (ok) toast(`hints will drop every ${newInterval} hours`);
    };
  });
  document.getElementById('c-abandon').onclick = abandonDraft;
  document.getElementById('c-submit').onclick = async () => {
    const intervalLabel = c.dropInterval === 12 ? '12 hours' : '24 hours';
    if (!confirm(`Submit round? Hint 1 drops immediately, then a new hint every ${intervalLabel}.`)) return;
    await submitRound();
  };
  afterRender();
}

function renderReveal() {
  const r = state.activeRound;
  const isSetter = r.setter_id === state.user.id;
  const winner = state.members.find(m => m.id === r.solved_by);
  $app.innerHTML = `
    ${topBar()}
    <div class="reveal-header">
      <div class="reveal-eyebrow">round ${r.round_number} · ${r.status === 'solved' ? `solved on hint ${r.solved_on_hint}` : 'unsolved'}</div>
      <div class="reveal-answer">${escape(r.answer)}</div>
    </div>
    <div class="reveal-hints">
      ${[1,2,3,4,5].map(pos => {
        const h = state.hints.find(x => x.position === pos);
        // Hints not yet unlocked at round end (round ended unsolved before this hint dropped)
        // Show the text but fade it, so the archive view is informative.
        const unlit = !h?.unlocked_at;
        const text = h?.text ? escape(h.text) : '— missing —';
        return `
          <div class="reveal-hint">
            <span class="num">0${pos}</span>
            <span class="word ${unlit?'unlit':''}">${text}</span>
          </div>`;
      }).join('')}
    </div>
    <div class="winner-line">
      ${r.status === 'solved' ? `solved by<span class="name">${escape(winner?.display_name || '?')}</span>sets next round` : `no one solved it · try again next round`}
    </div>
    <div style="text-align:center;padding:0 32px 32px">
      <button class="btn" id="next-round">start next round</button>
    </div>`;
  wireTopBar();
  document.getElementById('next-round').onclick = async () => {
    state.activeRound = null; state.view = 'home'; render();
  };
  afterRender();
}

function renderArchive() {
  const cur = state.groups.find(g => g.id === state.currentGroupId);
  $app.innerHTML = `
    ${topBar()}
    <div class="wordmark-block"><div style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--ink-faint);padding-top:8px">the archive · ${state.archive.length} rounds</div></div>
    <div class="archive-list">
      ${state.archive.length === 0 ? '<div style="text-align:center;color:var(--ink-faint);font-style:italic;padding:40px 0">no rounds yet</div>' :
        state.archive.map(r => `
        <div class="archive-entry" data-rid="${r.id}">
          <span class="entry-num">${String(r.round_number).padStart(3,'0')}</span>
          <div class="entry-mid">
            <span class="entry-answer">${escape(r.answer)}</span>
            <span class="entry-meta">${escape(r.category)} · ${escape(r.profiles?.display_name || '?')}</span>
          </div>
          <div class="entry-stat">${r.status === 'solved' ? `0${r.solved_on_hint}<span class="small">hints</span>` : `<span class="small">unsolved</span>`}</div>
        </div>`).join('')}
    </div>`;
  wireTopBar();
  document.querySelectorAll('.archive-entry').forEach(el => {
    el.onclick = async () => {
      const rid = el.dataset.rid;
      const r = state.archive.find(x => x.id === rid);
      state.activeRound = r;
      await loadHints(rid);
      state.view = 'reveal'; render();
    };
  });
  afterRender();
}

function renderEditProfile() {
  const currentName = state.profile?.display_name || '';
  const currentPronoun = state.profile?.pronoun || 'their';
  $app.innerHTML = `
    ${topBar()}
    <div class="detail-screen">
      <div class="detail-eyebrow">your profile</div>
      <div class="detail-title">${escape(currentName)}</div>
      <div class="detail-block">
        <div class="detail-label">display name</div>
        <input id="ep-name" class="text-input" type="text" value="${escape(currentName)}" />
      </div>
      <div class="detail-block">
        <div class="detail-label">your pronoun</div>
        <div class="pronoun-toggle">
          <button class="pronoun-opt ${currentPronoun==='his'?'active':''}" data-pronoun="his">his</button>
          <button class="pronoun-opt ${currentPronoun==='her'?'active':''}" data-pronoun="her">her</button>
          <button class="pronoun-opt ${currentPronoun==='their'?'active':''}" data-pronoun="their">their</button>
        </div>
      </div>
      <div class="detail-block">
        <button class="btn detail-btn full" id="ep-save">save</button>
        <button class="btn btn-ghost detail-btn full" id="ep-back">← back</button>
      </div>
    </div>`;
  wireTopBar();
  let pronoun = currentPronoun;
  document.querySelectorAll('.pronoun-opt').forEach(b => {
    b.onclick = () => {
      document.querySelectorAll('.pronoun-opt').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      pronoun = b.dataset.pronoun;
    };
  });
  document.getElementById('ep-save').onclick = async () => {
    const newName = document.getElementById('ep-name').value.trim();
    if (!newName) { toast('name cannot be empty'); return; }
    const { error } = await supabase.from('profiles').update({ display_name: newName, pronoun }).eq('id', state.user.id);
    if (error) { toast('save failed'); console.error(error); return; }
    state.profile.display_name = newName;
    state.profile.pronoun = pronoun;
    toast('profile updated');
    state.view = 'home';
    await loadGroupContext();
  };
  document.getElementById('ep-back').onclick = () => {
    state.view = 'home';
    render();
  };
  afterRender();
}

function renderGroupDetail() {
  const g = state.groups.find(x => x.id === state.manageGroupId);
  if (!g) { state.view = 'home'; render(); return; }
  const isCreator = g.created_by === state.user.id;
  $app.innerHTML = `
    ${topBar()}
    <div class="detail-screen">
      <div class="detail-eyebrow">manage group</div>
      <div class="detail-title">${escape(g.name)}</div>
      <div class="detail-block">
        <div class="detail-label">invite code</div>
        <div class="detail-row">
          <code class="invite-code">${escape(g.invite_code)}</code>
          <button class="btn btn-ghost detail-btn" id="d-copy">copy</button>
        </div>
      </div>
      <div class="detail-block">
        <div class="detail-label">danger zone</div>
        <button class="btn btn-ghost detail-btn full" id="d-leave">leave this group</button>
        ${isCreator ? `<button class="btn btn-ghost detail-btn full danger" id="d-delete">delete group for everyone</button>` : ''}
      </div>
      <div class="detail-block">
        <button class="btn btn-ghost detail-btn full" id="d-back">← back</button>
      </div>
    </div>`;
  wireTopBar();
  document.getElementById('d-copy').onclick = () => {
    navigator.clipboard.writeText(g.invite_code);
    toast('code copied');
  };
  document.getElementById('d-leave').onclick = () => leaveGroup(g.id);
  const del = document.getElementById('d-delete');
  if (del) del.onclick = () => deleteGroup(g.id);
  document.getElementById('d-back').onclick = () => {
    state.manageGroupId = null;
    state.view = 'home';
    render();
  };
  afterRender();
}

window.addEventListener('resize', () => placeAllDots());

init();
</script>
